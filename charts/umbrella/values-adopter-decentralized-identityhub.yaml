---
bdrs-server-memory:
  nameOverride: bdrs-server
  fullnameOverride: bdrs-server
  enabled: false
  seeding:
    url: "http://bdrs-server.tx.test"
    enabled: true
    bpnList:
      - bpn: "BPNL000000000001"
        did: "did:web:provider.local:identityhub:BPNL000000000001"
      - bpn: "BPNL000000000002"
        did: "did:web:consumer.local:identityhub:BPNL000000000002"
      - bpn: "BPNL000000000003"
        did: "did:web:issuerservice.local:BPNL000000000003"

  server:
    trustedIssuers:
      - did:web:issuerservice.local:BPNL000000000003
    env:
      EDC_IAM_DID_WEB_USE_HTTPS: false
      EDC_IAM_CREDENTIAL_REVOCATION_MIMETYPE: application/json
    endpoints:
      management:
        authKey: TEST
    ingresses:
      - enabled: true
        hostname: bdrs-server.tx.test
        endpoints:
          - directory
          - management
        className: "nginx"
        tls:
          enabled: false

edc-provider:
  enabled: true
  install:
    postgresql: true
    vault: false
  shared-configuration:
    did: &providerParticipantDid "did:web:provider.local:identityhub:BPNL000000000001"
    bpn: &providerParticipantBpn "BPNL000000000001"
    bdrsUrl:  &providerBdrsUrl "http://bdrs-server.tx.test/api/directory"
    tokenUrl: &providerTokenUrl "http://provider.local/identityhub/api/sts/token"
    secret-alias: &providerSecretAlias "provider-secret"
    secret-value: &providerSecretValue "provider"
    privatekeyAlias: &providerPrivatekeyAlias "tokenSignerPrivateKey"
    publickeyAlias: &providerPublickeyAlias "tokenSignerPublicKey"
    xApiKey: &providerXApiKey "ZGlkOndlYjpwcm92aWRlci5sb2NhbDppZGVudGl0eWh1YjpCUE5MMDAwMDAwMDAwMDAx.randomChars"
    trustedIssuers: &providerTrustedIssuers
      - did:web:issuerservice.local:BPNL000000000003

    ingress:
      publicEnabled: &providerPublicIngressEnabled true
      privateEnabled: &providerPrivateIngressEnabled true
      tls: &providerIngressTls
        enabled: false
      publicHostname: &providerPublicHostname "provider.local"
      privateHostname: &providerPrivateHostname "provider.intranet"

  postgresql:
    nameOverride: "provider-postgresql"
    connector: &providerConnectorPostgresql
      jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-provider-postgresql:5432/edc"
    identityhub: &providerIdentityhubPostgresql
      jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-provider-postgresql:5432/ih"
  vault:
    nameOverride: &providerVaultName "provider-vault"
    hashicorp: &providerVaultHashicorp
      url: "http://{{ .Release.Name }}-provider-vault:8200"

  tx-data-provider:
    enabled: true
    dataspace-connector-bundle:
      enabled: true
      nameOverride: ""
      secrets:
        edc-wallet-secret: *providerSecretValue
      tractusx-connector:
        enabled: true
        postgresql: *providerConnectorPostgresql
        vault:
          hashicorp: *providerVaultHashicorp
        participant:
          id: *providerParticipantBpn

        iatp:
          id: *providerParticipantDid
          trustedIssuers: *providerTrustedIssuers
          sts:
            dim:
              url: ""
            oauth:
              token_url: *providerTokenUrl
              client:
                id: *providerParticipantDid
                secret_alias: *providerSecretAlias
        controlplane:
          debug:
            enabled: true
            port: 5005
            suspendOnStart: false
          env:
            TX_IAM_IATP_CREDENTIALSERVICE_URL: http://provider.local/identityhub/api/credentials/v1/participants/ZGlkOndlYjpwcm92aWRlci5sb2NhbDppZGVudGl0eWh1YjpCUE5MMDAwMDAwMDAwMDAx
            EDC_IAM_DID_WEB_USE_HTTPS: false
            EDC_IAM_CREDENTIAL_REVOCATION_MIMETYPE: application/json
          bdrs:
            cache_validity_seconds: 600
            server:
              url: *providerBdrsUrl
          policy:
            validation:
              enabled: true
          ingresses:
            - enabled: *providerPublicIngressEnabled
              hostname: *providerPublicHostname
              tls: *providerIngressTls
              endpoints:
                - protocol
            - enabled: *providerPrivateIngressEnabled
              hostname: *providerPrivateHostname
              tls: *providerIngressTls
              endpoints:
                - management
                - control
                - catalog
        dataplane:
          env:
            TX_IAM_IATP_CREDENTIALSERVICE_URL: http://provider.local/identityhub/api/credentials/v1/participants/ZGlkOndlYjpwcm92aWRlci5sb2NhbDppZGVudGl0eWh1YjpCUE5MMDAwMDAwMDAwMDAx
            EDC_IAM_DID_WEB_USE_HTTPS: false
            EDC_IAM_CREDENTIAL_REVOCATION_MIMETYPE: application/json
          token:
            signer:
              privatekey_alias: *providerPrivatekeyAlias
            verifier:
              publickey_alias: *providerPublickeyAlias
            debug:
              enabled: false
              port: 1044
              suspendOnStart: false
          logs:
            level: DEBUG
          ingresses:
            - enabled: *providerPublicIngressEnabled
              hostname: *providerPublicHostname
              tls: *providerIngressTls
              endpoints:
                - public
            - enabled: *providerPrivateIngressEnabled
              hostname: *providerPrivateHostname
              tls: *providerIngressTls
              endpoints:
                - proxy
      vault:
        enabled: true
        nameOverride: *providerVaultName

  tractusx-identityhub:
    enabled: true
    postgresql: *providerIdentityhubPostgresql
    vault:  
      hashicorp: *providerVaultHashicorp
    identityhub:
      iatp:
        sts:
          oauth:
            client:
              enabled: true
              id: *providerParticipantDid
              secret: *providerSecretValue
              secret_alias: *providerSecretAlias
              x_api_key: *providerXApiKey
      didweb:
        https: false
      ingresses:
        - enabled: *providerPublicIngressEnabled
          hostname: *providerPublicHostname
          tls: *providerIngressTls
          endpoints:
            - did
            - credentials
            - sts
        - enabled: *providerPrivateIngressEnabled
          hostname: *providerPrivateHostname
          tls: *providerIngressTls
          endpoints:
            - identity

edc-consumer:
  enabled: false
  install:
    postgresql: true
    vault: false
  shared-configuration:
    did: &consumerParticipantDid "did:web:consumer.local:identityhub:BPNL000000000002"
    bpn: &consumerParticipantBpn "BPNL000000000002"
    bdrsUrl:  &consumerBdrsUrl "http://bdrs-server.tx.test/api/directory"
    tokenUrl: &consumerTokenUrl "http://consumer.local/identityhub/api/sts/token"
    secret-alias: &consumerSecretAlias "consumer-secret"
    secret-value: &consumerSecretValue "consumer"
    privatekeyAlias: &consumerPrivatekeyAlias "tokenSignerPrivateKey"
    publickeyAlias: &consumerPublickeyAlias "tokenSignerPublicKey"
    xApiKey: &consumerXApiKey "ZGlkOndlYjpjb25zdW1lci5sb2NhbDppZGVudGl0eWh1YjpCUE5MMDAwMDAwMDAwMDAy.randomChars"
    trustedIssuers: &consumerTrustedIssuers
      - did:web:issuerservice.local:BPNL000000000003

    ingress:
      publicEnabled: &consumerPublicIngressEnabled true
      privateEnabled: &consumerPrivateIngressEnabled true
      tls: &consumerIngressTls
        enabled: false
      publicHostname: &consumerPublicHostname "consumer.local"
      privateHostname: &consumerPrivateHostname "consumer.intranet"

  postgresql:
    nameOverride: "consumer-postgresql"
    connector: &consumerConnectorPostgresql
      jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-consumer-postgresql:5432/edc"
    identityhub: &consumerIdentityhubPostgresql
      jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-consumer-postgresql:5432/ih"
  vault:
    nameOverride: &consumerVaultName "consumer-vault"
    hashicorp: &consumerVaultHashicorp
      url: "http://{{ .Release.Name }}-consumer-vault:8200"

  tx-data-provider:
    enabled: true
    dataspace-connector-bundle:
      enabled: true
      nameOverride: ""
      secrets:
        edc-wallet-secret: *consumerSecretValue
      tractusx-connector:
        enabled: true
        postgresql: *consumerConnectorPostgresql
        vault:
          hashicorp: *consumerVaultHashicorp
        participant:
          id: *consumerParticipantBpn

        iatp:
          id: *consumerParticipantDid
          trustedIssuers: *consumerTrustedIssuers
          sts:
            dim:
              url: ""
            oauth:
              token_url: *consumerTokenUrl
              client:
                id: *consumerParticipantDid
                secret_alias: *consumerSecretAlias
        controlplane:
          debug:
            enabled: false
            port: 5005
            suspendOnStart: false
          env:
            TX_IAM_IATP_CREDENTIALSERVICE_URL: http://consumer.local/identityhub/api/credentials/v1/participants/ZGlkOndlYjpjb25zdW1lci5sb2NhbDppZGVudGl0eWh1YjpCUE5MMDAwMDAwMDAwMDAy
            EDC_IAM_DID_WEB_USE_HTTPS: false
            EDC_IAM_CREDENTIAL_REVOCATION_MIMETYPE: application/json
          bdrs:
            cache_validity_seconds: 600
            server:
              url: *consumerBdrsUrl
          policy:
            validation:
              enabled: true
          ingresses:
            - enabled: *consumerPublicIngressEnabled
              hostname: *consumerPublicHostname
              tls: *consumerIngressTls
              endpoints:
                - protocol
            - enabled: *consumerPrivateIngressEnabled
              hostname: *consumerPrivateHostname
              tls: *consumerIngressTls
              endpoints:
                - management
                - control
                - catalog
        dataplane:
          env:
            TX_IAM_IATP_CREDENTIALSERVICE_URL: http://consumer.local/identityhub/api/credentials/v1/participants/ZGlkOndlYjpjb25zdW1lci5sb2NhbDppZGVudGl0eWh1YjpCUE5MMDAwMDAwMDAwMDAy
            EDC_IAM_DID_WEB_USE_HTTPS: false
            EDC_IAM_CREDENTIAL_REVOCATION_MIMETYPE: application/json
          token:
            signer:
              privatekey_alias: *consumerPrivatekeyAlias
            verifier:
              publickey_alias: *consumerPublickeyAlias
            debug:
              enabled: false
              port: 1044
              suspendOnStart: false
          logs:
            level: DEBUG
          ingresses:
            - enabled: *consumerPublicIngressEnabled
              hostname: *consumerPublicHostname
              tls: *consumerIngressTls
              endpoints:
                - public
            - enabled: *consumerPrivateIngressEnabled
              hostname: *consumerPrivateHostname
              tls: *consumerIngressTls
              endpoints:
                - proxy
      vault:
        enabled: true
        nameOverride: *consumerVaultName

    digital-twin-bundle:
      enabled: false
    data-persistence-layer-bundle:
      enabled: false
  tractusx-identityhub:
    enabled: true
    postgresql: *consumerIdentityhubPostgresql
    vault:  
      hashicorp: *consumerVaultHashicorp
    identityhub:
      iatp:
        sts:
          oauth:
            client:
              enabled: true
              id: *consumerParticipantDid
              secret: *consumerSecretValue
              secret_alias: *consumerSecretAlias
              x_api_key: *consumerXApiKey
      didweb:
        https: false
      ingresses:
        - enabled: *consumerPublicIngressEnabled
          hostname: *consumerPublicHostname
          tls: *consumerIngressTls
          endpoints:
            - did
            - credentials
            - sts
        - enabled: *consumerPrivateIngressEnabled
          hostname: *consumerPrivateHostname
          tls: *consumerIngressTls
          endpoints:
            - identity

tractusx-issuerservice:
  enabled: true
  nameOverride: issuerservice
  install:
    postgresql: true
    vault: true
  issuerservice:
    didWeb:
      https: false
    jtiValidation: false
    ingresses:
      - enabled: true
        hostname: issuerservice.local
        tls:
          enabled: false
        endpoints:
          - did
          - issuance
          - sts
          - statuslist
          - issueradmin
          - identity
  postgresql:
    nameOverride: "issuerservice-postgresql"
    jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-issuerservice-postgresql:5432/issuer"
    persistence:
      enabled: false
    auth:
      username: user
      password: password
      database: issuer
  vault:
    nameOverride: "issuerservice-vault"
    hashicorp:
      url: "http://{{ .Release.Name }}-issuerservice-vault:8200"
  statuslist:
    signing_key:
      alias: alias
    callback:
      address: http://issuerservice.local/statuslist
  attestationClaimSeeding:
    enabled: true
    kubectlImage: "bitnamilegacy/kubectl:1.32.2"
    waitForPodTimeout: "300s"
    backoffLimit: 3
    sql: |
      INSERT INTO custom_attestation_claims (
          holder_id,
          holder_identifier,
          member_of,
          bpn,
          group_name,
          use_case,
          contract_template,
          contract_version,
          created_date,
          last_modified_date
      ) VALUES (
          'did:web:provider.local:identityhub:BPNL000000000001',
          'did:web:provider.local:identityhub:BPNL000000000001',
          'Catena-X',
          'BPNL000000000001',
          'UseCaseFramework',
          'DataExchangeGovernance',
          'https://example.org/temp-1',
          '1.0',
          EXTRACT(EPOCH FROM NOW())::BIGINT * 1000,
          EXTRACT(EPOCH FROM NOW())::BIGINT * 1000
      );

      INSERT INTO custom_attestation_claims (
          holder_id,
          holder_identifier,
          member_of,
          bpn,
          group_name,
          use_case,
          contract_template,
          contract_version,
          created_date,
          last_modified_date
      ) VALUES (
          'did:web:consumer.local:identityhub:BPNL000000000002',
          'did:web:consumer.local:identityhub:BPNL000000000002',
          'Catena-X',
          'BPNL000000000002',
          'UseCaseFramework',
          'DataExchangeGovernance',
          'https://example.org/temp-1',
          '1.0',
          EXTRACT(EPOCH FROM NOW())::BIGINT * 1000,
          EXTRACT(EPOCH FROM NOW())::BIGINT * 1000
      );
