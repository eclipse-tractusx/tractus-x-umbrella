# Default values for identity-and-trust-bundle
# This is a YAML-formatted file.

# SSI DIM Wallet Configuration
ssi-dim-wallet-stub:
  # -- Enable SSI DIM Wallet deployment
  # @section -- Wallet Component Configuration
  enabled: false
  wallet:
    # -- Kubernetes namespace
    # @section -- Wallet Component Configuration
    nameSpace: "default"
    # @ignore
    replicaCount: 1
    # @ignore
    appName: "ssi-dim-wallet-stub"
    # @ignore
    configName: "ssi-dim-wallet-config"
    # @ignore
    serviceName: "ssi-dim-wallet-service"
    # -@ignore
    secretName: "ssi-dim-wallet-secret"
    # @ignore
    ingressName: "ssi-dim-wallet-ingress"
    seeding:
      # -- List of BPNs for which wallets will be seeded on application startup
      # @section -- Wallet Seeding Configuration
      bpnList: "BPNL00000003AZQP,BPNL00000003AYRE"
    # -- Operator BPN
    # @section -- Wallet Core Configuration
    baseWalletBpn: "BPNL00000003CRHK"
    # -- Wallet stub server URL. This will pe part of the presentation query API in the did document
    # @section -- Wallet Core Configuration
    stubUrl: "http://ssi-dim-wallet-stub.tx.test"
    # -- Default status list VC id
    # @section -- Wallet Core Configuration
    statusListVcId: "8a6c7486-1e1f-4555-bdd2-1a178182651e"
    # -- Token expiry time in seconds
    # @section -- Wallet Core Configuration
    tokenExpiryTime: "5"
    ingress:
      # -- Enable ingress creation
      # @section -- Wallet Ingress Configuration
      enabled: true
      tls:
        # -- Enable TLS
        # @section -- Wallet Ingress Configuration
        enabled: false
        # -- TLS secret name
        # @section -- Wallet Ingress Configuration
        name: ""
      # -- URL prefix
      # @section -- Wallet Ingress Configuration
      urlPrefix: /
      # @ignore
      className: nginx
      # @ignore
      annotations: {}
    # -- External hostname for wallet
    # @section -- Wallet Ingress Configuration
    host: ssi-dim-wallet-stub.tx.test
    # -- Did document host, this will be part of did String i.e., did:web:<didHost>
    # @section -- Wallet Ingress Configuration
    didHost: "ssi-dim-wallet-stub.tx.test"
    portal:
      # -- Wait for given seconds before pushing data to portal backend after wallet creation
      # @section -- (Optional) Portal Integration
      waitTime: "60"
      # -- Portal backend application host
      # @section -- (Optional) Portal Integration
      host: "http://portal-backend.tx.test"
      # -- Keycloak client_id. We will create an access token and using this we access portal backend APIs
      # @section -- (Optional) Portal Integration
      clientId: "sa-cl2-05"
      # -- (Optional) Keycloak client_secret. We will create an access token and using this we access portal backend APIs
      # @section -- (Optional) Portal Integration
      clientSecret: "changeme"
    # -- Kubernetes [liveness-probe](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    livenessProbe:
      # -- Enables/Disables the livenessProbe at all
      enabled: true
      # -- When a probe fails, Kubernetes will try failureThreshold times before giving up. Giving up in case of liveness probe means restarting the container.
      failureThreshold: 3
      # -- Number of seconds after the container has started before readiness probes are initiated.
      initialDelaySeconds: 75
      # -- Number of seconds after which the probe times out.
      timeoutSeconds: 60
      # -- How often (in seconds) to perform the probe
      periodSeconds: 15

    # -- Kubernetes [readiness-probe](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
    readinessProbe:
      # -- Enables/Disables the readinessProbe at all
      enabled: true
      # -- When a probe fails, Kubernetes will try failureThreshold times before giving up. In case of readiness probe the Pod will be marked Unready.
      failureThreshold: 3
      # -- Number of seconds after the container has started before readiness probe are initiated.
      initialDelaySeconds: 75
      # -- How often (in seconds) to perform the probe
      periodSeconds: 15
      # -- Minimum consecutive successes for the probe to be considered successful after having failed.
      successThreshold: 1
      # -- Number of seconds after which the probe times out.
      timeoutSeconds: 60
    keycloak:
      # -- Keycloak realm name
      # @section -- (Optional) Keycloak Integration
      realm: "CX-Central"
      # -- Keycloak auth server URL
      # @section -- (Optional) Keycloak Integration
      authServerUrl: "http://centralidp.tx.test/auth"
    postgresql:
      username: "postgres"
      password: "postgrespassword"
    service:
      type: ClusterIP
      port: 8080
    resources:
      requests:
        # -- CPU resource requests
        cpu: 500m
        # -- Memory resource requests
        memory: 1Gi
      limits:
        # -- CPU resource limits
        cpu: 1
        # -- Memory resource limits
        memory: 2Gi
  postgresql:
    fullnameOverride: wallet-postgres
    enabled: true
    configmap:
      name: wallet-postgres-configmap
    auth:
      username: postgres
      password: postgrespassword
    persistence:
      enabled: false
      size: 10Gi
      storageClass: standard

tractusx-identityhub:
  # -- Enable Identity Hub deployment
  enabled: false
  identityhub:
    image:
      repository: "identityhub"
      # -- [Kubernetes image pull policy](https://kubernetes.io/docs/concepts/containers/images/#image-pull-policy) to use
      pullPolicy: Never
      # -- Overrides the image tag whose default is the chart appVersion
      tag: "test"
    initContainers: []
    useSVE: false
    debug:
      enabled: false
      port: 1044
      suspendOnStart: false
    livenessProbe:
      # -- Whether to enable kubernetes [liveness-probe](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
      enabled: true
      # -- seconds to wait before performing the first liveness check
      initialDelaySeconds: 5
      # -- this fields specifies that kubernetes should perform a liveness check every 5 seconds
      periodSeconds: 5
      # -- number of seconds after which the probe times out
      timeoutSeconds: 5
      # -- when a probe fails kubernetes will try 6 times before giving up
      failureThreshold: 6
      # -- number of consecutive successes for the probe to be considered successful after having failed
      successThreshold: 1
    readinessProbe:
      # -- Whether to enable kubernetes [readiness-probes](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
      enabled: true
      # -- seconds to wait before performing the first readiness check
      initialDelaySeconds: 5
      # -- this fields specifies that kubernetes should perform a readiness check every 5 seconds
      periodSeconds: 5
      # -- number of seconds after which the probe times out
      timeoutSeconds: 5
      # -- when a probe fails kubernetes will try 6 times before giving up
      failureThreshold: 6
      # -- number of consecutive successes for the probe to be considered successful after having failed
      successThreshold: 1
    # -- endpoints of the control plane
    endpoints:
      # -- default api for health checks, should not be added to any ingress
      default:
        # -- port for incoming api calls
        port: 8081
        # -- path for incoming api calls
        path: /api
      # -- management api, used by internal users, can be added to an ingress and must not be internet facing
      identity:
        # -- port for incoming api calls
        port: 8082
        # -- path for incoming api calls
        path: /api/identity
        # -- authentication key, must be attached to each 'X-Api-Key' request header
        authKeyAlias: "sup3r$3cr3t"
      # -- DCP Presentation API endpoint
      credentials:
        # -- port for incoming api calls
        port: 8083
        # -- path for incoming api calls
        path: /api/credentials
      # -- DID service endpoint. DID documents can be resolved from here.
      did:
        # -- port for incoming api calls
        port: 8084
        # -- path for incoming api calls
        path: /
      # -- STS Accounts API, used to manipulate STS accounts
      accounts:
        port: 8085
        path: /api/accounts
        authKeyAlias: "sup3r$3cr3t"
      # -- Version API, used to obtain exact version information about all APIs at runtime
      version:
        port: 8086
        path: /.well-known/api
      # -- STS Endpoint, used to obtain tokens
      sts:
        port: 8087
        path: /api/sts


    service:
      # -- [Service type](https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types) to expose the running application on a set of Pods as a network service.
      type: ClusterIP
      annotations: {}
    # -- additional labels for the pod
    podLabels: {}
    # -- additional annotations for the pod
    podAnnotations: {}
    # -- The [pod security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod) defines privilege and access control settings for a Pod within the deployment
    podSecurityContext:
      seccompProfile:
        # -- Restrict a Container's Syscalls with seccomp
        type: RuntimeDefault
      # -- Runs all processes within a pod with a special uid
      runAsUser: 10100
      # -- Processes within a pod will belong to this guid
      runAsGroup: 10100
      # -- The owner for volumes and any files created within volumes will belong to this guid
      fsGroup: 10100
    # The [container security context](https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-container) defines privilege and access control settings for a Container within a pod
    securityContext:
      capabilities:
        # -- Specifies which capabilities to drop to reduce syscall attack surface
        drop:
          - ALL
        # -- Specifies which capabilities to add to issue specialized syscalls
        add: []
      # -- Whether the root filesystem is mounted in read-only mode
      readOnlyRootFilesystem: true
      # -- Controls [Privilege Escalation](https://kubernetes.io/docs/concepts/security/pod-security-policy/#privilege-escalation) enabling setuid binaries changing the effective user ID
      allowPrivilegeEscalation: false
      # -- Requires the container to run without root privileges
      runAsNonRoot: true
      # -- The container's process will run with the specified uid
      runAsUser: 10100
    # Extra environment variables that will be pass onto deployment pods
    env: {}
    #  ENV_NAME: value

    # "valueFrom" environment variable references that will be added to deployment pods. Name is templated.
    # ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.19/#envvarsource-v1-core
    envValueFrom: {}
    #  ENV_NAME:c
    #    configMapKeyRef:
    #      name: configmap-name
    #      key: value_key
    #    secretKeyRef:
    #      name: secret-name
    #      key: value_key

    # [Kubernetes Secret Resource](https://kubernetes.io/docs/concepts/configuration/secret/) names to load environment variables from
    envSecretNames: []
    #  - first-secret
    #  - second-secret

    # [Kubernetes ConfigMap Resource](https://kubernetes.io/docs/concepts/configuration/configmap/) names to load environment variables from
    envConfigMapNames: []
    #  - first-config-map
    #  - second-config-map

    ## Ingress declaration to expose the network service.
    ingresses:
      ## Public / Internet facing Ingress for the Presentation API
      - enabled: false
        # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
        hostname: "identityhub.presentation.local"
        # -- Additional ingress annotations to add
        annotations: {}
        # -- EDC endpoints exposed by this ingress resource
        endpoints:
          - credentials
          - did
          - sts
        # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class)  to use
        className: ""
        # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
        tls:
          # -- Enables TLS on the ingress resource
          enabled: false
          # -- If present overwrites the default secret name
          secretName: ""
        ## Adds [cert-manager](https://cert-manager.io/docs/) annotations to the ingress resource
        certManager:
          # -- If preset enables certificate generation via cert-manager namespace scoped issuer
          issuer: ""
          # -- If preset enables certificate generation via cert-manager cluster-wide issuer
          clusterIssuer: ""
      ## Ingress for the Identity API, should not be internet facing
      - enabled: false
        # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
        hostname: "identityhub.identity.local"
        # -- Additional ingress annotations to add
        annotations: {}
        # -- EDC endpoints exposed by this ingress resource
        endpoints:
          - identity
          - accounts
          - version
        # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class)  to use
        className: ""
        # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
        tls:
          # -- Enables TLS on the ingress resource
          enabled: false
          # -- If present overwrites the default secret name
          secretName: ""
        ## Adds [cert-manager](https://cert-manager.io/docs/) annotations to the ingress resource
        certManager:
          # -- If preset enables certificate generation via cert-manager namespace scoped issuer
          issuer: ""
          # -- If preset enables certificate generation via cert-manager cluster-wide issuer
          clusterIssuer: ""
    # -- declare where to mount [volumes](https://kubernetes.io/docs/concepts/storage/volumes/) into the container
    volumeMounts: []
    # -- [volume](https://kubernetes.io/docs/concepts/storage/volumes/) directories
    volumes: []
    # -- [resource management](https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/) for the container
    resources:
      limits:
        cpu: 1.5
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 128Mi
    replicaCount: 1
    autoscaling:
      # -- Enables [horizontal pod autoscaling](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)
      enabled: false
      # -- Minimal replicas if resource consumption falls below resource threshholds
      minReplicas: 1
      # -- Maximum replicas if resource consumption exceeds resource threshholds
      maxReplicas: 100
      # -- targetAverageUtilization of cpu provided to a pod
      targetCPUUtilizationPercentage: 80
      # -- targetAverageUtilization of memory provided to a pod
      targetMemoryUtilizationPercentage: 80
    # Configuration of the [Java Util Logging Facade](https://docs.oracle.com/javase/7/docs/technotes/guides/logging/overview.html)
    logging:
      # -- Enable logging to create .log files
      enabled: true
      persistence:
        # -- Enable .log files to persist in local machine
        enabled: false
        # -- Persistent volume access mode
        accessMode: ReadWriteOnce
        # -- Persistent volume size
        size: 1Gi
        # -- Persistent volume claim storage name
        storageClass: "standard"
      # -- List of handlers to use in the logger
      handlers:
        - java.util.logging.ConsoleHandler
        - java.util.logging.FileHandler
      handlersConfig:
        # -- Console handler configuration
        java.util.logging.ConsoleHandler:
          level: FINE
          formatter: org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter
        java.util.logging.FileHandler:
          # -- Log level of handler
          level: FINE
          # -- Formatter to use in handler, formatter must be set in identityhub.logging.formatters
          formatter: org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter
          # -- Path where the log is created, must be the same path as the logging.path values
          pattern: /app/logs/identityhub.log
          # -- Limit of bytes to write before log file rotation
          limit: 0
          # -- Number of files to use in log file rotation
          count: 1
          # -- Append logs to the file or create new file every deployment
          append: true
      formatters:
        # -- configuration of custom colorful formatter
        org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter:
          format: "%7$s[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] [%4$s] %5$s%6$s%n%8$s"
      # -- root log level
      level: INFO
      # -- package level control
      # @default -- `{"org.eclipse.edc": "FINE"}`
      logLevels:
        org.glassfish: "OFF"
        jdk.event: "OFF"
        jakarta.json: "OFF"
        org.jvnet: "OFF"
        okhttp3.internal: "OFF"
        org.flywaydb: "OFF"
        org.postgresql: "OFF"
        org.eclipse.edc: "FINE"
        org.eclipse.tractusx: "FINE"
      # -- path where the log resides, must be the same path as the fileHandler pattern
      path: /app/logs
      # -- default logging properties if logging is not enabled
      default: |-
        .level=INFO
        org.eclipse.edc.level=INFO
        handlers=java.util.logging.ConsoleHandler
        java.util.logging.ConsoleHandler.formatter=org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter
        java.util.logging.ConsoleHandler.level=ALL
        org.eclipse.tractusx.identityhub.monitor.ColorfulFormatter.format=%7$s[%1$tY-%1$tm-%1$td %1$tH:%1$tM:%1$tS] [%4$s] %5$s%6$s%n%8$s
    # [node selector](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#nodeselector) to constrain pods to nodes
    nodeSelector: {}
    # [tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) to configure preferred nodes
    tolerations: []
    # [affinity](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity) to configure which nodes the pods can be scheduled on
    affinity: {}
    url:
      # -- Explicitly declared url for reaching the dsp api (e.g. if ingresses not used)
      protocol: ""
      public: ""
      readiness: ""
    # -- Initial participant context configuration
    iatp:
      sts:
        oauth:
          client:
            # -- Enable participant context client configuration
            enabled: false
            # -- Client ID // Did of the initial participant
            id: "did:web:identityhub.presentation.local"
            # -- The client secret that is stored in the vault for requesting OAuth2 access token for Presentation API access
            secret: "testme"
            # -- Alias under which the client secret is stored in the vault
            secret_alias: "sts-secret"
            # -- The x-api-key that is stored in the vault for the initial participant
            x_api_key: "ZGlkOndlYjppZGVudGl0eWh1Yi5wcmVzZW50YXRpb24ubG9jYWw=.randomChars"
    # -- Whether web DIDs should be interpreted as HTTPS or HTTP
    didweb:
      https: false

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
    # -- Existing image pull secret bound to the service account to use to [obtain the container image from private registries](https://kubernetes.io/docs/concepts/containers/images/#using-a-private-registry)
    imagePullSecrets: []
  # -- Configurations for Helm tests
  tests:
    # -- Configure the hook-delete-policy for Helm tests
    hookDeletePolicy: before-hook-creation,hook-succeeded

  postgresql:
    image:
      # -- workaround to use bitnamilegacy chart for version 12.12.x till committers align on new postgresql charts
      repository: bitnamilegacy/postgresql
      # -- workaround to use bitnamilegacy chart for version 12.12.x till committers align on new postgresql charts
      tag: 15.4.0-debian-11-r45
    jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/ih"
    primary:
      persistence:
        enabled: false
      resources:
        limits:
          cpu: 1
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 256Mi
    readReplicas:
      persistence:
        enabled: false
      resources:
        limits:
          cpu: 500Mi
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 256Mi
    auth:
      database: "ih"
      username: "user"
      password: "password"

  vault:
    injector:
      enabled: false
    server:
      dev:
        enabled: true
        devRootToken: "root"
      postStart:    # must be set externally!
    hashicorp:
      url: "http://{{ .Release.Name }}-vault:8200"
      token: "root"
      timeout: 30
      healthCheck:
        enabled: true
        standbyOk: true
      paths:
        secret: /v1/secret
        health: /v1/sys/health
